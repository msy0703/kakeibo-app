<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="家計簿">
  <meta name="theme-color" content="#1a1a2e">
  <title>家計簿</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/dexie@4/dist/dexie.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap');

    :root {
      --bg: #0d0d1a;
      --bg2: #13132a;
      --bg3: #1e1e3a;
      --surface: #1e1e3a;
      --border: #2e2e50;
      --accent-blue: #4fc3f7;
      --accent-pink: #f48fb1;
      --accent-green: #a5d6a7;
      --accent-orange: #ffcc80;
      --text-primary: #e8e8f0;
      --text-secondary: #8888aa;
      --text-muted: #555570;
      --income: #69f0ae;
      --expense: #ff6b6b;
      --radius: 16px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Zen Kaku Gothic New', sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-top: var(--safe-top);
    }

    /* ── HEADER ── */
    .header {
      padding: 16px 20px 12px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .app-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .month-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-primary);
      width: 32px; height: 32px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .month-btn:active { background: var(--border); }

    .month-label {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      min-width: 80px;
      text-align: center;
    }

    .summary-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .summary-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      text-align: center;
    }

    .summary-card .label {
      font-size: 10px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }

    .summary-card .amount {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 400;
    }

    .amount.income { color: var(--income); }
    .amount.expense { color: var(--expense); }
    .amount.balance { color: var(--accent-blue); }
    .amount.negative { color: var(--expense); }

    /* ── TABS ── */
    .tabs {
      display: flex;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      padding: 12px 0;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab.active {
      color: var(--accent-blue);
      border-bottom-color: var(--accent-blue);
    }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding-bottom: 100px;
    }

    /* ── LIST VIEW ── */
    .list-view { padding: 16px 16px; }

    .date-group { margin-bottom: 24px; padding-bottom: 0; }

    .date-group-header {
      background: linear-gradient(135deg, var(--bg3) 0%, var(--surface) 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    .date-group-header:active {
      background: linear-gradient(135deg, var(--border) 0%, var(--bg3) 100%);
      transform: scale(0.99);
    }

    .date-group-header-info {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .date-group-header-date {
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .date-group-header-weekday {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .date-group-header-summary {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
    }

    .date-group-summary-item {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .date-group-summary-label {
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .date-group-summary-value {
      font-size: 12px;
      font-weight: 600;
    }

    .date-group-summary-value.income {
      color: var(--income);
    }

    .date-group-summary-value.expense {
      color: var(--expense);
    }

    .date-group-summary-value.balance {
      color: var(--accent-blue);
    }

    .date-group-header-chevron {
      font-size: 14px;
      color: var(--text-secondary);
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .date-group-header.collapsed .date-group-header-chevron {
      transform: rotate(-90deg);
    }

    .txn-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-user-select: none;
    }

    .txn-item:active {
      background: var(--surface);
      transform: scale(0.98);
    }

    .txn-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      background: rgba(79, 195, 247, 0.1);
    }

    .txn-item.expense .txn-icon {
      background: rgba(255, 107, 107, 0.1);
    }

    .txn-item.income .txn-icon {
      background: rgba(105, 240, 174, 0.1);
    }

    .txn-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .txn-memo {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .txn-cat {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .txn-amount {
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      font-weight: 600;
      flex-shrink: 0;
      text-align: right;
    }

    .txn-item.expense .txn-amount {
      color: var(--expense);
    }

    .txn-item.income .txn-amount {
      color: var(--income);
    }


    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

    /* ── CHART VIEW ── */
    .chart-view { padding: 16px; }

    .chart-mode-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .chart-mode-btn {
      flex: 1;
      padding: 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chart-mode-btn.active {
      background: var(--accent-blue);
      color: var(--bg);
      border-color: var(--accent-blue);
    }

    .chart-section { margin-bottom: 24px; }

    .section-title {
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .category-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .cat-name {
      font-size: 13px;
      width: 70px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-wrap {
      flex: 1;
      height: 8px;
      background: var(--bg3);
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }

    .cat-amount {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
      width: 60px;
      text-align: right;
    }

    .donut-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .donut-svg { flex-shrink: 0; }

    .donut-legend {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ── BUDGET VIEW ── */
    .budget-view { padding: 16px; }

    /* ── MASTER VIEW ── */
    .master-view { padding: 0; }

    .master-tabs {
      display: flex;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 12px;
    }

    .master-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .master-tab.active {
      color: var(--accent-blue);
      border-bottom-color: var(--accent-blue);
    }

    .master-content {
      padding: 16px;
    }

    .master-section {
      margin-bottom: 24px;
    }

    .master-section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-blue);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--accent-blue);
    }

    .app-info-block {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .app-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 13px;
    }

    .app-info-label {
      color: var(--text-secondary);
    }

    .app-info-value {
      color: var(--text-primary);
      font-family: 'DM Mono', monospace;
      font-weight: 600;
    }

    .version-history {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    .version-item {
      margin-bottom: 16px;
    }

    .version-item:last-child {
      margin-bottom: 0;
    }

    .version-header {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-blue);
      margin-bottom: 8px;
    }

    .version-changes {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .version-changes li {
      margin-left: 16px;
      margin-bottom: 4px;
    }

    .cat-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .cat-chip {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px;
      font-size: 12px;
      text-align: center;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .cat-chip-icon {
      font-size: 20px;
    }

    .cat-chip-delete {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 20px;
      height: 20px;
      background: var(--expense);
      border-radius: 50%;
      color: white;
      border: none;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .add-cat-form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .add-cat-input {
      flex: 1;
      display: flex;
      gap: 6px;
    }

    .add-cat-input input {
      flex: 1;
      padding: 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 6px;
      font-size: 12px;
    }

    .add-cat-emoji {
      width: 32px;
      padding: 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
    }

    .add-btn {
      padding: 8px 12px;
      background: var(--accent-blue);
      border: none;
      color: var(--bg);
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-btn:active {
      background: var(--accent-pink);
    }

    .budget-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .budget-info { flex: 1; }

    .budget-cat {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .budget-bar-wrap {
      height: 6px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden;
    }

    .budget-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s;
    }

    .budget-amount {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .budget-edit-btn {
      padding: 6px 12px;
      background: var(--accent-blue);
      border: none;
      border-radius: 6px;
      color: var(--bg);
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .budget-edit-btn:active { background: var(--accent-pink); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-height: 90dvh;
      overflow-y: auto;
      padding: 0 0 calc(20px + var(--safe-bottom));
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      padding: 20px 20px 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .modal-content {
      padding: 0 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      display: block;
    }

    .form-input {
      width: 100%;
      padding: 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    .type-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .type-btn {
      padding: 20px;
      background: var(--bg3);
      border: 2px solid var(--border);
      color: var(--text-muted);
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-height: 100px;
      justify-content: center;
    }

    .type-btn span:first-child {
      font-size: 32px;
      display: block;
      line-height: 1;
    }

    .type-btn span:last-child {
      font-size: 14px;
    }

    .type-btn.active {
      background: var(--accent-blue);
      color: white;
      border-color: var(--accent-blue);
      box-shadow: 0 4px 12px rgba(79, 195, 247, 0.3);
    }

    .cat-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .cat-btn {
      padding: 10px 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      cursor: pointer;
      font-size: 11px;
      text-align: center;
      transition: all 0.2s;
    }

    .cat-btn.selected {
      background: var(--accent-blue);
      color: var(--bg);
      border-color: var(--accent-blue);
    }

    .modal-buttons {
      display: flex;
      gap: 8px;
      padding: 16px 20px 0;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .modal-btn:active { background: var(--border); }

    .modal-btn.primary {
      background: var(--accent-blue);
      color: var(--bg);
      border-color: var(--accent-blue);
    }

    /* ── TOOLBAR ── */
    .toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      padding-bottom: var(--safe-bottom);
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      z-index: 100;
    }

    .toolbar-side-buttons {
      display: flex;
      gap: 20px;
      width: auto;
    }

    .toolbar-btn {
      width: 48px;
      height: 48px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .toolbar-btn:active {
      color: var(--accent-blue);
    }

    .toolbar-fab-wrapper {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .toolbar-btn.fab {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
      border-radius: 50%;
      color: white;
      font-size: 32px;
      box-shadow: 0 4px 12px rgba(79, 195, 247, 0.3);
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .toolbar-btn.fab:active {
      opacity: 0.9;
      color: white;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 300;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .toast.show {
      opacity: 1;
    }

    /* ── UPDATE MODAL ── */
    .update-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      z-index: 999;
      display: none;
      width: 90%;
      max-width: 320px;

const CATEGORIES = {
  expense: [
    { id: 'food', icon: '🍔', name: '食費' },
    { id: 'transport', icon: '🚗', name: '交通' },
    { id: 'utility', icon: '💡', name: '光熱費' },
    { id: 'shopping', icon: '🛍️', name: 'ショッピング' },
    { id: 'health', icon: '🏥', name: '医療' },
    { id: 'entertainment', icon: '🎬', name: '娯楽' },
    { id: 'other', icon: '📦', name: 'その他' }
  ],
  income: [
    { id: 'salary', icon: '💼', name: '給与' },
    { id: 'bonus', icon: '🎁', name: 'ボーナス' },
    { id: 'other', icon: '💰', name: 'その他' }
  ]
};

const CAT_COLORS = ['#4fc3f7', '#f48fb1', '#a5d6a7', '#ffcc80', '#ce93d8', '#ef9a9a', '#80deea'];

// ===== マイグレーション関数 =====
async function migrateFromLocalStorage() {
  const migrated = await db.settings.get('migrated_v1');
  if (migrated) return; // 既に移行済み

  const lsTxns = localStorage.getItem('kakeiboTxns');
  if (lsTxns) {
    try {
      const txns = JSON.parse(lsTxns);
      if (txns.length > 0) await db.transactions.bulkPut(txns);
    } catch (e) {
      console.log('txns migration failed:', e);
    }
  }

  const puts = [];
  const budgets = localStorage.getItem('kakeibobudgets');
  if (budgets) {
    try {
      puts.push({ key: 'budgets', value: JSON.parse(budgets) });
    } catch (e) {
      console.log('budgets migration failed:', e);
    }
  }

  const customCategories = localStorage.getItem('kakeiboCustomCategories');
  if (customCategories) {
    try {
      puts.push({ key: 'customCategories', value: JSON.parse(customCategories) });
    } catch (e) {
      console.log('customCategories migration failed:', e);
    }
  }

  const userName = localStorage.getItem('kakeiboUserName');
  if (userName) puts.push({ key: 'userName', value: userName });

  // collapsed_YYYY-MM-DD を collapsedDates オブジェクトに統合
  const collapsedDates = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('collapsed_')) {
      collapsedDates[key.replace('collapsed_', '')] = true;
    }
  }
  if (Object.keys(collapsedDates).length > 0) puts.push({ key: 'collapsedDates', value: collapsedDates });

  puts.push({ key: 'migrated_v1', value: true });
  if (puts.length > 0) await db.settings.bulkPut(puts);
}

async function requestPersistentStorage() {
  if (navigator.storage && navigator.storage.persist) {
    const granted = await navigator.storage.persist();
    console.log('Persistent storage:', granted ? 'granted' : 'denied');
  }
}

class KakeiboApp {
  constructor() {
    this.state = {
      userName: '本人',
      txns: [],
      budgets: {},
      customCategories: { expense: [], income: [] },
      currentYear: new Date().getFullYear(),
      currentMonth: new Date().getMonth() + 1
    };

    this.ui = {
      currentTab: 'list',
      chartMode: 'month',
      selectedType: 'expense',
      selectedCat: 'food',
      editingId: null,
      pendingImport: null,
      currentQRLink: null
    };

    this.collapsedDates = {};

    this.initAsync();
  }

  async initAsync() {
    await migrateFromLocalStorage();
    await this.loadAllState();
    await requestPersistentStorage();
    this.init();
  }

  async loadAllState() {
    this.state.txns = await this.loadTxns();
    const budgetsSetting = await this.loadBudgets();
    this.state.budgets = budgetsSetting || {};
    const customCatsSetting = await this.loadCustomCategories();
    this.state.customCategories = customCatsSetting || { expense: [], income: [] };
    const userNameSetting = await this.loadUserName();
    this.state.userName = userNameSetting || '本人';
    const collapsedSetting = await this.loadCollapsedDates();
    this.collapsedDates = collapsedSetting || {};
  }

  init() {
    this.registerServiceWorker();
    this.render();
    this.setupEventListeners();
    this.checkForUpdates();
    setInterval(() => this.checkForUpdates(), 60000);

    // Check for URL import parameter
    const params = new URLSearchParams(window.location.search);
    const importData = params.get('import');
    if (importData) {
      try {
        const json = decodeURIComponent(escape(atob(importData)));
        const data = JSON.parse(json);
        if (data.txns && Array.isArray(data.txns)) {
          this.ui.pendingImport = data;
          document.getElementById('importItemCount').textContent = data.txns.length;
          document.getElementById('importConfirmOverlay').classList.add('open');
          // Clean up URL
          window.history.replaceState({}, document.title, window.location.pathname);
        }
      } catch (err) {
        console.log('Import from URL failed:', err);
      }
    }
  }

  registerServiceWorker() {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(e => {
        console.log('SW registration failed:', e);
      });
    }
  }

  async loadTxns() {
    try {
      return await db.transactions.toArray();
    } catch (e) {
      console.log('loadTxns error:', e);
      return [];
    }
  }

  async saveTxns() {
    try {
      await db.transactions.bulkPut(this.state.txns);
    } catch (e) {
      console.log('saveTxns error:', e);
    }
  }

  async loadBudgets() {
    try {
      const setting = await db.settings.get('budgets');
      return setting ? setting.value : {};
    } catch (e) {
      console.log('loadBudgets error:', e);
      return {};
    }
  }

  async saveBudgets() {
    try {
      await db.settings.put({ key: 'budgets', value: this.state.budgets });
    } catch (e) {
      console.log('saveBudgets error:', e);
    }
  }

  async loadCustomCategories() {
    try {
      const setting = await db.settings.get('customCategories');
      return setting ? setting.value : { expense: [], income: [] };
    } catch (e) {
      console.log('loadCustomCategories error:', e);
      return { expense: [], income: [] };
    }
  }

  async saveCustomCategories() {
    try {
      await db.settings.put({ key: 'customCategories', value: this.state.customCategories });
    } catch (e) {
      console.log('saveCustomCategories error:', e);
    }
  }

  async loadUserName() {
    try {
      const setting = await db.settings.get('userName');
      return setting ? setting.value : '本人';
    } catch (e) {
      console.log('loadUserName error:', e);
      return '本人';
    }
  }

  async saveUserName(name) {
    try {
      await db.settings.put({ key: 'userName', value: name });
    } catch (e) {
      console.log('saveUserName error:', e);
    }
  }

  async loadCollapsedDates() {
    try {
      const setting = await db.settings.get('collapsedDates');
      return setting ? setting.value : {};
    } catch (e) {
      console.log('loadCollapsedDates error:', e);
      return {};
    }
  }

  async saveCollapsedDates() {
    try {
      await db.settings.put({ key: 'collapsedDates', value: this.collapsedDates });
    } catch (e) {
      console.log('saveCollapsedDates error:', e);
    }
  }

  getCategories(type) {
    const base = type === 'expense' ? CATEGORIES.expense : CATEGORIES.income;
    const custom = this.state.customCategories[type] || [];
    return [...base, ...custom];
  }

  changeMonth(delta) {
    this.state.currentMonth += delta;
    if (this.state.currentMonth > 12) {
      this.state.currentMonth = 1;
      this.state.currentYear += 1;
    } else if (this.state.currentMonth < 1) {
      this.state.currentMonth = 12;
      this.state.currentYear -= 1;
    }
    this.render();
  }

  switchTab(tab) {
    this.ui.currentTab = tab;
    document.querySelectorAll('.tab').forEach((el, i) => {
      el.classList.toggle('active', ['list', 'chart', 'budget'][i] === tab);
    });
    document.querySelectorAll('.view').forEach(el => el.style.display = 'none');
    document.getElementById(`${tab}-view`).style.display = 'block';
    if (tab === 'chart') this.renderChart();
    else if (tab === 'budget') this.renderBudget();
    else if (tab === 'master') this.renderMaster();
    else this.renderList();
  }

  setChartMode(mode) {
    this.ui.chartMode = mode;
    document.querySelectorAll('.chart-mode-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.includes(mode === 'month' ? '月別' : '年間'));
    });
    document.getElementById('chart-month').style.display = mode === 'month' ? 'block' : 'none';
    document.getElementById('chart-year').style.display = mode === 'year' ? 'block' : 'none';
    if (mode === 'month') this.renderMonthChart();
    else this.renderYearChart();
  }

  formatYen(amount) {
    return '¥' + amount.toLocaleString('ja-JP');
  }

  getMonthTxns() {
    return this.state.txns.filter(t => {
      const d = new Date(t.date);
      return d.getFullYear() === this.state.currentYear &&
             d.getMonth() + 1 === this.state.currentMonth;
    });
  }

  toggleDateGroup(element, date) {
    const contentDiv = element.nextElementSibling;
    const isHidden = contentDiv.style.display === 'none';
    contentDiv.style.display = isHidden ? 'block' : 'none';
    element.classList.toggle('collapsed', !isHidden);

    if (isHidden) {
      delete this.collapsedDates[date];
    } else {
      this.collapsedDates[date] = true;
    }
    this.saveCollapsedDates().catch(e => console.log('Failed to save collapsed dates:', e));
  }

  renderList() {
    const txns = this.getMonthTxns();
    const grouped = {};

    txns.forEach(t => {
      if (!grouped[t.date]) grouped[t.date] = [];
      grouped[t.date].push(t);
    });

    const dates = Object.keys(grouped).sort().reverse();
    let html = '';

    if (dates.length === 0) {
      html = '<div class="empty-state"><div class="icon">📊</div>取引がありません</div>';
    } else {
      dates.forEach(date => {
        const dateTxns = grouped[date];
        const dayIncome = dateTxns.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
        const dayExpense = dateTxns.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
        const dayBalance = dayIncome - dayExpense;
        const isExpanded = !this.collapsedDates[date];
        const d = new Date(date);
        const dateStr = d.toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' });
        const weekdayStr = d.toLocaleDateString('ja-JP', { weekday: 'short' });

        html += `<div class="date-group">
          <div class="date-group-header ${!isExpanded ? 'collapsed' : ''}" onclick="app.toggleDateGroup(this, '${date}')">
            <div class="date-group-header-info">
              <div class="date-group-header-date">${dateStr}日</div>
              <div class="date-group-header-weekday">（${weekdayStr}）</div>
            </div>
            <div class="date-group-header-summary">
              <div class="date-group-summary-item">
                <div class="date-group-summary-label">収入</div>
                <div class="date-group-summary-value income">${dayIncome > 0 ? '+' + this.formatYen(dayIncome) : '¥0'}</div>
              </div>
              <div class="date-group-summary-item">
                <div class="date-group-summary-label">支出</div>
                <div class="date-group-summary-value expense">${dayExpense > 0 ? '-' + this.formatYen(dayExpense) : '¥0'}</div>
              </div>
              <div class="date-group-summary-item">
                <div class="date-group-summary-label">残高</div>
                <div class="date-group-summary-value balance">${this.formatYen(dayBalance)}</div>
              </div>
            </div>
            <div class="date-group-header-chevron">▼</div>
          </div>
          <div style="display:${isExpanded ? 'block' : 'none'}">`;

        dateTxns.forEach(t => {
          const cat = [...this.getCategories('income'), ...this.getCategories('expense')].find(c => c.id === t.cat) || { icon: '📦', name: '?' };
          html += `<div class="txn-item ${t.type}" onclick="app.openEdit('${t.id}')">
            <div class="txn-icon">${cat.icon}</div>
            <div class="txn-info">
              <div class="txn-memo">${t.memo || '（メモなし）'}</div>
              <div class="txn-cat">${cat.name}</div>
              <div style="font-size:11px;color:var(--text-muted);margin-top:3px">${this.state.userName}</div>
            </div>
            <div class="txn-amount">
              ${t.type === 'income' ? '+' : '-'}${this.formatYen(t.amount)}
            </div>
          </div>`;
        });

        html += `</div></div>`;
      });
    }

    document.getElementById('list-view').innerHTML = html;
    this.updateSummary();
  }

  renderChart() {
    if (this.ui.chartMode === 'month') this.renderMonthChart();
    else this.renderYearChart();
  }

  renderMonthChart() {
    const txns = this.getMonthTxns();
    const expenses = txns.filter(t => t.type === 'expense');
    const incomes = txns.filter(t => t.type === 'income');

    const catTotals = {};
    expenses.forEach(t => { catTotals[t.cat] = (catTotals[t.cat] || 0) + t.amount; });
    const sorted = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);
    const total = sorted.reduce((s, [, v]) => s + v, 0);

    let html = '';

    if (sorted.length) {
      html += `<div class="chart-section"><div class="section-title">支出の内訳</div>`;
      sorted.forEach(([catId, amt], i) => {
        const cat = this.getCategories('expense').find(c => c.id === catId) || { icon: '📦', name: 'その他' };
        const pct = total ? (amt / total * 100) : 0;
        html += `<div class="category-bar">
          <div class="cat-name">${cat.icon} ${cat.name}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${CAT_COLORS[i % CAT_COLORS.length]}"></div></div>
          <div class="cat-amount">${this.formatYen(amt)}</div>
        </div>`;
      });
      html += `</div>`;
    }

    const incCatTotals = {};
    incomes.forEach(t => { incCatTotals[t.cat] = (incCatTotals[t.cat] || 0) + t.amount; });
    const incSorted = Object.entries(incCatTotals).sort((a, b) => b[1] - a[1]);
    const incTotal = incSorted.reduce((s, [, v]) => s + v, 0);

    if (incSorted.length) {
      html += `<div class="chart-section"><div class="section-title">収入の内訳</div>`;
      incSorted.forEach(([catId, amt], i) => {
        const cat = this.getCategories('income').find(c => c.id === catId) || { icon: '💰', name: 'その他' };
        const pct = incTotal ? (amt / incTotal * 100) : 0;
        html += `<div class="category-bar">
          <div class="cat-name">${cat.icon} ${cat.name}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:var(--income)"></div></div>
          <div class="cat-amount" style="color:var(--income)">${this.formatYen(amt)}</div>
        </div>`;
      });
      html += `</div>`;
    }

    document.getElementById('chart-month').innerHTML = html;
  }

  renderYearChart() {
    const monthData = {};
    for (let m = 1; m <= 12; m++) {
      monthData[m] = { income: 0, expense: 0, categories: {} };
    }

    this.state.txns.filter(t => t.type === 'income' || t.type === 'expense').forEach(t => {
      const d = new Date(t.date);
      if (d.getFullYear() === this.state.currentYear) {
        const m = d.getMonth() + 1;
        if (monthData[m]) {
          monthData[m][t.type] += t.amount;
          if (!monthData[m].categories[t.cat]) monthData[m].categories[t.cat] = 0;
          monthData[m].categories[t.cat] += t.amount;
        }
      }
    });

    let html = '<div class="chart-section"><div class="section-title">カテゴリ別月表</div>';

    const allCats = new Set();
    Object.values(monthData).forEach(m => {
      Object.keys(m.categories).forEach(cat => allCats.add(cat));
    });

    const catList = Array.from(allCats);
    html += '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table style="width:100%;font-size:11px;border-collapse:collapse">';
    html += '<tr><th style="padding:8px 6px;text-align:left;border-bottom:2px solid var(--border);min-width:60px;font-weight:600">月</th>';

    catList.forEach(catId => {
      const cat = [...this.getCategories('income'), ...this.getCategories('expense')].find(c => c.id === catId) || { icon: '📦', name: '?' };
      html += `<th style="padding:8px 4px;text-align:center;border-bottom:2px solid var(--border);min-width:70px;font-weight:600">${cat.icon}</th>`;
    });
    html += '</tr>';

    for (let m = 1; m <= 12; m++) {
      html += `<tr><td style="padding:8px 6px;border-bottom:1px solid var(--border);min-width:60px;font-weight:500">${m}月</td>`;
      catList.forEach(catId => {
        const amt = monthData[m].categories[catId] || 0;
        html += `<td style="padding:8px 4px;text-align:right;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;min-width:70px">${amt ? this.formatYen(amt) : '-'}</td>`;
      });
      html += '</tr>';
    }

    html += '<tr style="font-weight:600;border-top:2px solid var(--border)"><td style="padding:8px 6px">合計</td>';
    catList.forEach(catId => {
      let catTotal = 0;
      for (let m = 1; m <= 12; m++) {
        catTotal += monthData[m].categories[catId] || 0;
      }
      html += `<td style="padding:8px 4px;text-align:right;color:var(--expense);font-family:'DM Mono',monospace;min-width:70px">${this.formatYen(catTotal)}</td>`;
    });
    html += '</tr></table></div></div>';

    document.getElementById('chart-year').innerHTML = html;
  }

  renderBudget() {
    let html = '';
    const budgets = Object.entries(this.state.budgets || {});

    if (budgets.length === 0) {
      html = '<div class="empty-state"><div class="icon">📋</div>予算が設定されていません</div>';
    } else {
      budgets.forEach(([catId, budget]) => {
        const cat = this.getCategories('expense').find(c => c.id === catId) || { icon: '📦', name: 'その他' };
        const txns = this.state.txns.filter(t => t.cat === catId && t.type === 'expense');
        const spent = txns.reduce((s, t) => s + t.amount, 0);
        const pct = Math.min(spent / budget * 100, 100);
        const color = pct > 90 ? 'var(--expense)' : pct > 70 ? 'var(--accent-orange)' : 'var(--income)';

        html += `<div class="budget-item">
          <div class="budget-info">
            <div class="budget-cat">${cat.icon} ${cat.name}</div>
            <div class="budget-bar-wrap"><div class="budget-bar-fill" style="width:${pct}%;background:${color}"></div></div>
            <div class="budget-amount">${this.formatYen(spent)} / ${this.formatYen(budget)}</div>
          </div>
          <button class="budget-edit-btn" onclick="app.openBudgetEdit('${catId}', '${cat.name}', ${budget})">設定</button>
        </div>`;
      });
    }

    document.getElementById('budget-view').innerHTML = html;
  }

  updateSummary() {
    const txns = this.getMonthTxns();
    const income = txns.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense = txns.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const balance = income - expense;

    document.getElementById('incomeAmount').textContent = this.formatYen(income);
    document.getElementById('expenseAmount').textContent = this.formatYen(expense);
    document.getElementById('balanceAmount').textContent = this.formatYen(balance);
    document.getElementById('monthLabel').textContent = `${this.state.currentYear}年${this.state.currentMonth}月`;
  }

  setMasterTab(tab) {
    document.querySelectorAll('.master-tab').forEach((el, i) => {
      el.classList.toggle('active', ['settings', 'info'][i] === tab);
    });
    document.getElementById('master-settings-tab').style.display = tab === 'settings' ? 'block' : 'none';
    document.getElementById('master-info-tab').style.display = tab === 'info' ? 'block' : 'none';
    if (tab === 'info') this.renderMasterInfo();
    else this.renderMasterSettings();
  }

  renderMaster() {
    this.renderMasterSettings();
  }

  renderMasterSettings() {
    let html = '';

    // 登録者名
    html += `<div class="master-section">
      <div class="master-section-title">登録者名</div>
      <div class="add-cat-form">
        <input type="text" id="masterUserName" class="form-input" style="flex:1" value="${this.state.userName}">
        <button class="add-btn" onclick="app.saveMasterUserName()">保存</button>
      </div>
    </div>`;

    // 支出カテゴリ
    html += `<div class="master-section">
      <div class="master-section-title">支出カテゴリ</div>
      <div class="cat-list">`;

    this.getCategories('expense').forEach(cat => {
      const isCustom = this.state.customCategories.expense.some(c => c.id === cat.id);
      html += `<div class="cat-chip">
        <div class="cat-chip-icon">${cat.icon}</div>
        <div style="font-size:10px">${cat.name}</div>
        ${isCustom ? `<button class="cat-chip-delete" onclick="app.deleteCat('expense', '${cat.id}')">×</button>` : ''}
      </div>`;

    html += `</div>
      <div class="add-cat-form">
        <div class="add-cat-input">
          <input type="text" id="expenseCatInput" placeholder="カテゴリ名" maxlength="8">
          <input type="text" id="expenseCatEmoji" placeholder="絵文字" maxlength="2" class="add-cat-emoji">
        </div>
        <button class="add-btn" onclick="app.addCat('expense')">追加</button>
      </div>
    </div>`;

    // 収入カテゴリ
    html += `<div class="master-section">
      <div class="master-section-title">収入カテゴリ</div>
      <div class="cat-list">`;

    this.getCategories('income').forEach(cat => {
      const isCustom = this.state.customCategories.income.some(c => c.id === cat.id);
      html += `<div class="cat-chip">
        <div class="cat-chip-icon">${cat.icon}</div>
        <div style="font-size:10px">${cat.name}</div>
        ${isCustom ? `<button class="cat-chip-delete" onclick="app.deleteCat('income', '${cat.id}')">×</button>` : ''}
      </div>`;
    });

    html += `</div>
      <div class="add-cat-form">
        <div class="add-cat-input">
          <input type="text" id="incomeCatInput" placeholder="カテゴリ名" maxlength="8">
          <input type="text" id="incomeCatEmoji" placeholder="絵文字" maxlength="2" class="add-cat-emoji">
        </div>
        <button class="add-btn" onclick="app.addCat('income')">追加</button>
      </div>
    </div>`;

    document.getElementById('master-settings-tab').innerHTML = html;
  }

  renderMasterInfo() {
    let html = '';

    // アプリ情報
    html += `<div class="master-section">
      <div class="master-section-title">アプリ情報</div>
      <div class="app-info-block">
        <div class="app-info-row">
          <span class="app-info-label">アプリ名</span>
          <span class="app-info-value">家計簿</span>
        </div>
        <div class="app-info-row">
          <span class="app-info-label">現在バージョン</span>
          <span class="app-info-value">${APP_VERSION}</span>
        </div>
      </div>
      <button class="modal-btn primary" style="width:100%;margin-top:12px" onclick="app.checkForUpdatesManual()">🔄 バージョンをチェック</button>
    </div>`;

    // バージョン履歴
    html += `<div class="master-section">
      <div class="master-section-title">最新の更新内容</div>
      <div class="version-history">`;

    const versionInfo = VERSION_INFO[APP_VERSION];
    if (versionInfo) {
      html += `<div class="version-item">
        <div class="version-header">バージョン ${APP_VERSION} (${versionInfo.date})</div>
        <ul class="version-changes">`;
      versionInfo.changes.forEach(change => {
        html += `<li>${change}</li>`;
      });
      html += `</ul>
      </div>`;
    }

    html += `</div>
    </div>`;

  addCat(type) {
    const nameInput = document.getElementById(`${type}CatInput`);
    const emojiInput = document.getElementById(`${type}CatEmoji`);
    const name = nameInput.value.trim();
    const emoji = emojiInput.value.trim();

    if (!name || !emoji) {
      this.showToast('カテゴリ名と絵文字を入力してください');
      return;
    }

    const id = 'custom_' + Date.now();
    const newCat = { id, icon: emoji, name };
    this.state.customCategories[type].push(newCat);
    this.saveCustomCategories().then(() => {
      nameInput.value = '';
      emojiInput.value = '';
      this.renderMaster();
      this.showToast('カテゴリを追加しました');
    }).catch(e => {
      console.log('Add category error:', e);
      this.showToast('カテゴリ追加に失敗しました');
    });
  }

  deleteCat(type, id) {
    this.state.customCategories[type] = this.state.customCategories[type].filter(c => c.id !== id);
    this.saveCustomCategories().then(() => {
      this.renderMaster();
      this.showToast('カテゴリを削除しました');
    }).catch(e => {
      console.log('Delete category error:', e);
      this.showToast('カテゴリ削除に失敗しました');
    });
  }

  saveMasterUserName() {
    const name = document.getElementById('masterUserName').value.trim();
    if (name) {
      this.state.userName = name;
      this.saveUserName(name).then(() => {
        this.showToast('保存しました');
      }).catch(e => {
        console.log('Save user name error:', e);
        this.showToast('保存に失敗しました');
      });
    }
  }

  render() {
    this.updateSummary();
    if (this.ui.currentTab === 'list') this.renderList();
    else if (this.ui.currentTab === 'chart') this.renderChart();
    else if (this.ui.currentTab === 'budget') this.renderBudget();
    else if (this.ui.currentTab === 'master') this.renderMaster();
  }

  // MODALS
  openModal() {
    this.ui.editingId = null;
    document.getElementById('modalTitle').textContent = '取引を追加';
    document.getElementById('deleteBtn').style.display = 'none';
    document.getElementById('txnDate').valueAsDate = new Date();
    document.getElementById('txnAmount').value = '';
    document.getElementById('txnMemo').value = '';
    this.setType('expense');
    this.renderCatButtons();
    document.getElementById('modalOverlay').classList.add('open');
  }

  openEdit(id) {
    const txn = this.state.txns.find(t => t.id === id);
    if (!txn) return;

    this.ui.editingId = id;
    document.getElementById('modalTitle').textContent = '取引を編集';
    document.getElementById('deleteBtn').style.display = 'block';
    document.getElementById('txnDate').valueAsDate = new Date(txn.date);
    document.getElementById('txnAmount').value = txn.amount;
    document.getElementById('txnMemo').value = txn.memo;
    this.setType(txn.type);
    this.ui.selectedCat = txn.cat;
    this.renderCatButtons();
    document.getElementById('modalOverlay').classList.add('open');
  }

  closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  saveTxn() {
    const date = document.getElementById('txnDate').value;
    const amount = parseInt(document.getElementById('txnAmount').value) || 0;
    const memo = document.getElementById('txnMemo').value;

    if (!date || amount <= 0) {
      this.showToast('日付と金額を入力してください');
      return;
    }

    if (this.ui.editingId) {
      const txn = this.state.txns.find(t => t.id === this.ui.editingId);
      if (txn) {
        txn.date = date;
        txn.amount = amount;
        txn.memo = memo;
        txn.type = this.ui.selectedType;
        txn.cat = this.ui.selectedCat;
      }
    } else {
      this.state.txns.push({
        id: Date.now().toString(),
        date,
        type: this.ui.selectedType,
        cat: this.ui.selectedCat,
        amount,
        memo
      });
    }

    this.saveTxns().then(() => {
      this.render();
      this.closeModal();
      this.showToast('保存しました');
    }).catch(e => {
      console.log('Save txn error:', e);
      this.showToast('保存に失敗しました');
    });
  }

  deleteTxn() {
    if (this.ui.editingId) {
      this.state.txns = this.state.txns.filter(t => t.id !== this.ui.editingId);
      this.saveTxns().then(() => {
        this.render();
        this.closeModal();
        this.showToast('削除しました');
      }).catch(e => {
        console.log('Delete txn error:', e);
        this.showToast('削除に失敗しました');
      });
    }
  }

  setType(type) {
    this.ui.selectedType = type;
    document.querySelectorAll('.type-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.includes(type === 'expense' ? '支出' : '収入'));
    });
    this.renderCatButtons();
  }

  renderCatButtons() {
    const cats = this.getCategories(this.ui.selectedType);
    let html = '';
    cats.forEach(cat => {
      html += `<button class="cat-btn ${cat.id === this.ui.selectedCat ? 'selected' : ''}" onclick="app.ui.selectedCat='${cat.id}';app.renderCatButtons()">
        ${cat.icon}<br><span style="font-size:9px">${cat.name}</span>
      </button>`;
    });
    document.getElementById('catButtons').innerHTML = html;
  }

  openExportImport() {
    document.getElementById('exportImportOverlay').classList.add('open');
  }

  closeExportImport() {
    document.getElementById('exportImportOverlay').classList.remove('open');
  }

  exportData() {
    (async () => {
      const txns = await this.loadTxns();
      const budgetsSetting = await db.settings.get('budgets');
      const customCatsSetting = await db.settings.get('customCategories');

      const data = {
        version: 1,
        exportDate: new Date().toISOString(),
        txns,
        budgets: budgetsSetting?.value || {},
        customCategories: customCatsSetting?.value || { expense: [], income: [] }
      };

      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `kakeibo-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      URL.revokeObjectURL(url);
      this.showToast('ダウンロードしました');
    })().catch(e => {
      console.log('Export error:', e);
      this.showToast('エクスポートに失敗しました');
    });
  }

  importData() {
    document.getElementById('importFileInput').click();
  }

  handleImportFile(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.txns && Array.isArray(data.txns)) {
          this.ui.pendingImport = data;
          document.getElementById('importItemCount').textContent = data.txns.length;
          document.getElementById('importConfirmOverlay').classList.add('open');
        }
      } catch (err) {
        this.showToast('ファイルが無効です');
      }
    };
    reader.readAsText(file);
  }

  confirmImport() {
    if (!this.ui.pendingImport?.txns) return;

    Promise.all([
      (async () => {
        await db.transactions.bulkPut(this.ui.pendingImport.txns);
        this.state.txns = await this.loadTxns();
      })(),
      (async () => {
        if (this.ui.pendingImport.budgets) {
          const existing = (await db.settings.get('budgets'))?.value || {};
          const merged = { ...existing, ...this.ui.pendingImport.budgets };
          await db.settings.put({ key: 'budgets', value: merged });
          this.state.budgets = merged;
        }
      })(),
      (async () => {
        if (this.ui.pendingImport.customCategories) {
          await db.settings.put({ key: 'customCategories', value: this.ui.pendingImport.customCategories });
          this.state.customCategories = this.ui.pendingImport.customCategories;
        }
      })()
    ]).then(() => {
      this.ui.pendingImport = null;
      document.getElementById('importConfirmOverlay').classList.remove('open');
      this.render();
      this.showToast('インポートしました');
    }).catch(e => {
      console.log('Confirm import error:', e);
      this.showToast('インポートに失敗しました');
    });
  }

  cancelImport() {
    this.ui.pendingImport = null;
    document.getElementById('importConfirmOverlay').classList.remove('open');
  }

  openBudgetEdit(catId, catName, budget) {
    this.ui.budgetEditCat = catId;
    document.getElementById('budgetCatLabel').textContent = catName;
    document.getElementById('budgetAmount').value = budget;
    document.getElementById('budgetModalOverlay').classList.add('open');
  }

  closeBudgetModal() {
    document.getElementById('budgetModalOverlay').classList.remove('open');
  }

  saveBudget() {
    const amount = parseInt(document.getElementById('budgetAmount').value) || 0;
    if (amount > 0) {
      this.state.budgets[this.ui.budgetEditCat] = amount;
      this.saveBudgets().then(() => {
        this.renderBudget();
        this.closeBudgetModal();
        this.showToast('保存しました');
      }).catch(e => {
        console.log('Save budget error:', e);
        this.showToast('保存に失敗しました');
      });
    }
  }

  openScan() {
    this.showToast('レシートスキャン機能は準備中です');
  }

  closeOverlay(event, overlayId) {
    if (event.target.id === overlayId) {
      document.getElementById(overlayId).classList.remove('open');
    }
  }

  showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  setupEventListeners() {
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay.open').forEach(el => {
          el.classList.remove('open');
        });
      }
    });
  }

  checkForUpdates() {
    fetch(window.location.href + '?t=' + Date.now())
      .then(r => r.text())
      .then(html => {
        const match = html.match(/const APP_VERSION = '([^']+)'/);
        const latestVersion = match ? match[1] : null;
        if (latestVersion && latestVersion !== APP_VERSION) {
          console.log('New version available:', latestVersion);
          setTimeout(() => this.showUpdateModal(latestVersion), 800);
        }
      })
      .catch(err => console.log('Update check error:', err));
  }

  checkForUpdatesManual() {
    this.showToast('チェック中...');
    fetch(window.location.href + '?t=' + Date.now())
      .then(r => r.text())
      .then(html => {
        const match = html.match(/const APP_VERSION = '([^']+)'/);
        const latestVersion = match ? match[1] : null;
        if (latestVersion && latestVersion !== APP_VERSION) {
          console.log('New version available:', latestVersion);
          this.showUpdateModal(latestVersion);
        } else {
          this.showToast('最新バージョンです');
        }
      })
      .catch(err => {
        console.log('Update check error:', err);
        this.showToast('チェックに失敗しました');
      });
  }

  showUpdateModal(version) {
    console.log('Show update modal for version:', version);
    const updateModal = document.getElementById('updateModal');
    const updateChanges = document.getElementById('updateChanges');
    const updateModalOverlay = document.getElementById('updateModalOverlay');

    if (!updateModal || !updateChanges) {
      console.log('Modal elements not found');
      return;
    }

    const versionInfo = VERSION_INFO[version];
    let changesHtml = '<strong style="display:block;margin-bottom:12px;color:var(--text-primary);">更新内容：</strong>';

    if (versionInfo && versionInfo.changes && versionInfo.changes.length > 0) {
      versionInfo.changes.forEach(change => {
        changesHtml += `<div style="margin-bottom:10px;padding-left:10px;border-left:2px solid var(--accent-blue);color:var(--text-primary);">• ${change}</div>`;
      });
    } else {
      changesHtml += '<div style="color:var(--text-primary);">新機能が追加されました</div>';
    }

    updateChanges.innerHTML = changesHtml;
    updateModal.classList.add('show');
    if (updateModalOverlay) {
      updateModalOverlay.style.display = 'block';
    }
    console.log('Modal shown');
  }

  updateApp() {
    location.reload(true);
  }

  closeUpdateModal(event) {
    if (event && event.target.id === 'updateModalOverlay') {
      const overlay = document.getElementById('updateModalOverlay');
      if (overlay) overlay.style.display = 'none';
    }
    document.getElementById('updateModal').classList.remove('show');
  }

  showQRCode() {
    (async () => {
      const txns = await this.loadTxns();
      const budgetsSetting = await db.settings.get('budgets');

      const data = {
        version: 1,
        exportDate: new Date().toISOString(),
        txns,
        budgets: budgetsSetting?.value || {}
      };

      const json = JSON.stringify(data);
      const encoded = btoa(unescape(encodeURIComponent(json)));
      const baseUrl = window.location.href.split('?')[0];
      const qrLink = `${baseUrl}?import=${encoded}`;

      const qrCodeContainer = document.getElementById('qrCodeContainer');
      const qrCodeLink = document.getElementById('qrCodeLink');
      const qrCodeModal = document.getElementById('qrCodeModal');
      const qrCodeModalOverlay = document.getElementById('qrCodeModalOverlay');

      if (!qrCodeContainer || !qrCodeLink || !qrCodeModal || !qrCodeModalOverlay) {
        console.log('QR Code modal elements not found');
        return;
      }

      // Clear previous QR code
      qrCodeContainer.innerHTML = '';

      // Generate QR code
      new QRCode(qrCodeContainer, {
        text: qrLink,
        width: 240,
        height: 240,
        colorDark: '#e8e8f0',
        colorLight: '#0d0d1a',
        correctLevel: QRCode.CorrectLevel.M
      });

      // Display link
      qrCodeLink.textContent = qrLink;
      this.ui.currentQRLink = qrLink;

      // Show modal
      qrCodeModal.classList.add('show');
      qrCodeModalOverlay.style.display = 'block';

      // Close export/import modal
      document.getElementById('exportImportOverlay').classList.remove('open');
    })().catch(e => {
      console.log('Show QR error:', e);
      this.showToast('QRコード生成に失敗しました');
    });
  }

  closeQRCode(event) {
    if (event && event.target.id === 'qrCodeModalOverlay') {
      const overlay = document.getElementById('qrCodeModalOverlay');
      if (overlay) overlay.style.display = 'none';
    }
    const qrCodeModal = document.getElementById('qrCodeModal');
    if (qrCodeModal) qrCodeModal.classList.remove('show');
  }

  copyQRLink() {
    const link = this.ui.currentQRLink;
    if (link) {
      navigator.clipboard.writeText(link).then(() => {
        this.showToast('リンクをコピーしました');
      }).catch(() => {
        this.showToast('コピーに失敗しました');
      });
    }
  }
}

const app = new KakeiboApp();
</script>

</body>
</html>
