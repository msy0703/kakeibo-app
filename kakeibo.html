<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="家計簿">
  <meta name="theme-color" content="#1a1a2e">
  <title>家計簿</title>
  <link rel="manifest" href="manifest.json">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap');

    :root {
      --bg: #0d0d1a;
      --bg2: #13132a;
      --bg3: #1e1e3a;
      --surface: #1e1e3a;
      --border: #2e2e50;
      --accent-blue: #4fc3f7;
      --accent-pink: #f48fb1;
      --accent-green: #a5d6a7;
      --accent-orange: #ffcc80;
      --text-primary: #e8e8f0;
      --text-secondary: #8888aa;
      --text-muted: #555570;
      --income: #69f0ae;
      --expense: #ff6b6b;
      --radius: 16px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Zen Kaku Gothic New', sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-top: var(--safe-top);
    }

    /* ── HEADER ── */
    .header {
      padding: 16px 20px 12px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .app-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .month-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-primary);
      width: 32px; height: 32px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .month-btn:active { background: var(--border); }

    .month-label {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      min-width: 80px;
      text-align: center;
    }

    .summary-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .summary-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      text-align: center;
    }

    .summary-card .label {
      font-size: 10px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }

    .summary-card .amount {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 400;
    }

    .amount.income { color: var(--income); }
    .amount.expense { color: var(--expense); }
    .amount.balance { color: var(--accent-blue); }
    .amount.negative { color: var(--expense); }

    /* ── TABS ── */
    .tabs {
      display: flex;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      padding: 12px 0;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab.active {
      color: var(--accent-blue);
      border-bottom-color: var(--accent-blue);
    }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding-bottom: 100px;
    }

    /* ── LIST VIEW ── */
    .list-view { padding: 12px 16px; }

    .date-group { margin-bottom: 16px; }

    .date-group-header {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      padding-left: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .date-group-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .txn-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-user-select: none;
    }

    .txn-item:active { background: var(--bg3); }

    .txn-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .txn-info { flex: 1; min-width: 0; }

    .txn-memo {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .txn-cat {
      font-size: 11px;
      color: var(--text-muted);
    }

    .txn-amount {
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      font-weight: 400;
      flex-shrink: 0;
    }

    .date-summary {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      padding: 0 4px;
      font-family: 'DM Mono', monospace;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

    /* ── CHART VIEW ── */
    .chart-view { padding: 16px; }

    .chart-mode-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .chart-mode-btn {
      flex: 1;
      padding: 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chart-mode-btn.active {
      background: var(--accent-blue);
      color: var(--bg);
      border-color: var(--accent-blue);
    }

    .chart-section { margin-bottom: 24px; }

    .section-title {
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .category-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .cat-name {
      font-size: 13px;
      width: 70px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-wrap {
      flex: 1;
      height: 8px;
      background: var(--bg3);
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }

    .cat-amount {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
      width: 60px;
      text-align: right;
    }

    .donut-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .donut-svg { flex-shrink: 0; }

    .donut-legend {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ── BUDGET VIEW ── */
    .budget-view { padding: 16px; }

    /* ── MASTER VIEW ── */
    .master-view { padding: 16px; }

    .master-section {
      margin-bottom: 24px;
    }

    .master-section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-blue);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--accent-blue);
    }

    .cat-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .cat-chip {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px;
      font-size: 12px;
      text-align: center;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .cat-chip-icon {
      font-size: 20px;
    }

    .cat-chip-delete {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 20px;
      height: 20px;
      background: var(--expense);
      border-radius: 50%;
      color: white;
      border: none;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .add-cat-form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .add-cat-input {
      flex: 1;
      display: flex;
      gap: 6px;
    }

    .add-cat-input input {
      flex: 1;
      padding: 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 6px;
      font-size: 12px;
    }

    .add-cat-emoji {
      width: 32px;
      padding: 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
    }

    .add-btn {
      padding: 8px 12px;
      background: var(--accent-blue);
      border: none;
      color: var(--bg);
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-btn:active {
      background: var(--accent-pink);
    }

    .budget-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .budget-info { flex: 1; }

    .budget-cat {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .budget-bar-wrap {
      height: 6px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden;
    }

    .budget-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s;
    }

    .budget-amount {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .budget-edit-btn {
      padding: 6px 12px;
      background: var(--accent-blue);
      border: none;
      border-radius: 6px;
      color: var(--bg);
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .budget-edit-btn:active { background: var(--accent-pink); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-height: 90dvh;
      overflow-y: auto;
      padding: 0 0 calc(20px + var(--safe-bottom));
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      padding: 20px 20px 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .modal-content {
      padding: 0 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      display: block;
    }

    .form-input {
      width: 100%;
      padding: 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    .type-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .type-btn {
      padding: 10px;
      background: var(--bg3);
      border: 2px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .type-btn.active {
      background: var(--accent-blue);
      color: var(--bg);
      border-color: var(--accent-blue);
    }

    .cat-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .cat-btn {
      padding: 10px 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      cursor: pointer;
      font-size: 11px;
      text-align: center;
      transition: all 0.2s;
    }

    .cat-btn.selected {
      background: var(--accent-blue);
      color: var(--bg);
      border-color: var(--accent-blue);
    }

    .modal-buttons {
      display: flex;
      gap: 8px;
      padding: 16px 20px 0;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .modal-btn:active { background: var(--border); }

    .modal-btn.primary {
      background: var(--accent-blue);
      color: var(--bg);
      border-color: var(--accent-blue);
    }

    /* ── TOOLBAR ── */
    .toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      padding-bottom: var(--safe-bottom);
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      z-index: 100;
    }

    .toolbar-side-buttons {
      display: flex;
      gap: 16px;
    }

    .toolbar-btn {
      width: 48px;
      height: 48px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .toolbar-btn:active {
      color: var(--accent-blue);
    }

    .toolbar-btn.fab {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
      border-radius: 50%;
      color: white;
      font-size: 32px;
      box-shadow: 0 4px 12px rgba(79, 195, 247, 0.3);
    }

    .toolbar-btn.fab:active {
      opacity: 0.9;
      color: white;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 300;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .toast.show {
      opacity: 1;
    }

    /* ── UPDATE MODAL ── */
    .update-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      z-index: 999;
      display: none;
      width: 90%;
      max-width: 300px;
    }

    .update-modal.show {
      display: block;
    }

    .update-modal-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .update-modal-message {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .update-modal-buttons {
      display: flex;
      gap: 8px;
    }

    .update-modal-buttons button {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text-primary);
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .update-modal-buttons button.primary {
      background: var(--accent-blue);
      color: var(--bg);
      border-color: var(--accent-blue);
    }
  </style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="app-title">家計簿</div>
      <div class="month-nav">
        <button class="month-btn" onclick="app.changeMonth(-1)">‹</button>
        <div class="month-label" id="monthLabel"></div>
        <button class="month-btn" onclick="app.changeMonth(1)">›</button>
      </div>
    </div>
    <div class="summary-row">
      <div class="summary-card">
        <div class="label">収入</div>
        <div class="amount income" id="incomeAmount">¥0</div>
      </div>
      <div class="summary-card">
        <div class="label">支出</div>
        <div class="amount expense" id="expenseAmount">¥0</div>
      </div>
      <div class="summary-card">
        <div class="label">残高</div>
        <div class="amount balance" id="balanceAmount">¥0</div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="app.switchTab('list')">明細</div>
    <div class="tab" onclick="app.switchTab('chart')">グラフ</div>
    <div class="tab" onclick="app.switchTab('budget')">予算</div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div id="list-view" class="list-view view" style="display:block"></div>
    <div id="chart-view" class="chart-view view" style="display:none">
      <div class="chart-mode-buttons">
        <button class="chart-mode-btn active" onclick="app.setChartMode('month')">📊 月別</button>
        <button class="chart-mode-btn" onclick="app.setChartMode('year')">📈 年間</button>
      </div>
      <div id="chart-month" style="display:block"></div>
      <div id="chart-year" style="display:none"></div>
    </div>
    <div id="budget-view" class="budget-view view" style="display:none"></div>
    <div id="master-view" class="master-view view" style="display:none"></div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-side-buttons">
    <button class="toolbar-btn" onclick="app.switchTab('master')" title="設定">⚙️</button>
    <button class="toolbar-btn" onclick="app.openExportImport()" title="共有">📤</button>
    <button class="toolbar-btn" onclick="app.openScan()" title="スキャン">🧾</button>
  </div>
  <button class="toolbar-btn fab" onclick="app.openModal()" title="追加">＋</button>
</div>

<!-- EXPORT/IMPORT MODAL -->
<div class="modal-overlay" id="exportImportOverlay" onclick="app.closeOverlay(event, 'exportImportOverlay')">
  <div class="modal">
    <div class="modal-title">データ共有</div>
    <div class="modal-content">
      <button class="modal-btn" style="width:100%;margin-bottom:8px" onclick="app.exportData()">📥 ダウンロード</button>
      <button class="modal-btn" style="width:100%;margin-bottom:8px" onclick="app.importData()">📤 読み込み</button>
      <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="app.handleImportFile(event)">
    </div>
    <div class="modal-buttons">
      <button class="modal-btn" onclick="app.closeExportImport()">閉じる</button>
    </div>
  </div>
</div>

<!-- IMPORT CONFIRM MODAL -->
<div class="modal-overlay" id="importConfirmOverlay" onclick="app.closeOverlay(event, 'importConfirmOverlay')">
  <div class="modal">
    <div class="modal-title">データをインポート</div>
    <div class="modal-content">
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">
        <span id="importItemCount">0</span>件の取引をインポートします
      </div>
    </div>
    <div class="modal-buttons">
      <button class="modal-btn primary" onclick="app.confirmImport()">インポート</button>
      <button class="modal-btn" onclick="app.cancelImport()">キャンセル</button>
    </div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="app.closeOverlay(event, 'modalOverlay')">
  <div class="modal">
    <div class="modal-title" id="modalTitle">取引を追加</div>
    <div class="modal-content">
      <div class="form-group">
        <label class="form-label">日付</label>
        <input type="date" id="txnDate" class="form-input">
      </div>

      <div class="type-buttons">
        <button class="type-btn active" onclick="app.setType('expense')">支出</button>
        <button class="type-btn" onclick="app.setType('income')">収入</button>
      </div>

      <div class="form-group">
        <label class="form-label">カテゴリ</label>
        <div class="cat-buttons" id="catButtons"></div>
      </div>

      <div class="form-group">
        <label class="form-label">金額</label>
        <input type="number" id="txnAmount" class="form-input" placeholder="0" min="0">
      </div>

      <div class="form-group">
        <label class="form-label">メモ</label>
        <input type="text" id="txnMemo" class="form-input" placeholder="任意">
      </div>
    </div>

    <div class="modal-buttons">
      <button class="modal-btn primary" onclick="app.saveTxn()">保存</button>
      <button class="modal-btn" id="deleteBtn" style="display:none" onclick="app.deleteTxn()">削除</button>
      <button class="modal-btn" onclick="app.closeModal()">キャンセル</button>
    </div>
  </div>
</div>

<!-- BUDGET EDIT MODAL -->
<div class="modal-overlay" id="budgetModalOverlay" onclick="app.closeOverlay(event, 'budgetModalOverlay')">
  <div class="modal">
    <div class="modal-title">予算を設定</div>
    <div class="modal-content">
      <div class="form-group">
        <label class="form-label" id="budgetCatLabel">カテゴリ</label>
        <input type="number" id="budgetAmount" class="form-input" placeholder="0" min="0">
      </div>
    </div>
    <div class="modal-buttons">
      <button class="modal-btn primary" onclick="app.saveBudget()">保存</button>
      <button class="modal-btn" onclick="app.closeBudgetModal()">キャンセル</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- UPDATE MODAL -->
<div id="updateModal" class="update-modal">
  <div class="update-modal-title">📲 アップデート</div>
  <div class="update-modal-message">新しいバージョンが利用可能です</div>
  <div class="update-modal-buttons">
    <button class="primary" onclick="app.updateApp()">更新</button>
    <button onclick="app.closeUpdateModal()">スキップ</button>
  </div>
</div>

<script>
const APP_VERSION = '20260330-003';

const CATEGORIES = {
  expense: [
    { id: 'food', icon: '🍔', name: '食費' },
    { id: 'transport', icon: '🚗', name: '交通' },
    { id: 'utility', icon: '💡', name: '光熱費' },
    { id: 'shopping', icon: '🛍️', name: 'ショッピング' },
    { id: 'health', icon: '🏥', name: '医療' },
    { id: 'entertainment', icon: '🎬', name: '娯楽' },
    { id: 'other', icon: '📦', name: 'その他' }
  ],
  income: [
    { id: 'salary', icon: '💼', name: '給与' },
    { id: 'bonus', icon: '🎁', name: 'ボーナス' },
    { id: 'other', icon: '💰', name: 'その他' }
  ]
};

const CAT_COLORS = ['#4fc3f7', '#f48fb1', '#a5d6a7', '#ffcc80', '#ce93d8', '#ef9a9a', '#80deea'];

class KakeiboApp {
  constructor() {
    this.state = {
      userName: localStorage.getItem('kakeiboUserName') || '本人',
      txns: this.loadTxns(),
      budgets: this.loadBudgets(),
      customCategories: this.loadCustomCategories(),
      currentYear: new Date().getFullYear(),
      currentMonth: new Date().getMonth() + 1
    };

    this.ui = {
      currentTab: 'list',
      chartMode: 'month',
      selectedType: 'expense',
      selectedCat: 'food',
      editingId: null,
      pendingImport: null
    };

    this.init();
  }

  init() {
    this.registerServiceWorker();
    this.render();
    this.setupEventListeners();
    this.checkForUpdates();
    setInterval(() => this.checkForUpdates(), 60000);
  }

  registerServiceWorker() {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(e => {
        console.log('SW registration failed:', e);
      });
    }
  }

  loadTxns() {
    const data = localStorage.getItem('kakeiboTxns');
    return data ? JSON.parse(data) : [];
  }

  saveTxns() {
    localStorage.setItem('kakeiboTxns', JSON.stringify(this.state.txns));
  }

  loadBudgets() {
    const data = localStorage.getItem('kakeibobudgets');
    return data ? JSON.parse(data) : {};
  }

  saveBudgets() {
    localStorage.setItem('kakeibobudgets', JSON.stringify(this.state.budgets));
  }

  loadCustomCategories() {
    const data = localStorage.getItem('kakeiboCustomCategories');
    return data ? JSON.parse(data) : { expense: [], income: [] };
  }

  saveCustomCategories() {
    localStorage.setItem('kakeiboCustomCategories', JSON.stringify(this.state.customCategories));
  }

  getCategories(type) {
    const base = type === 'expense' ? CATEGORIES.expense : CATEGORIES.income;
    const custom = this.state.customCategories[type] || [];
    return [...base, ...custom];
  }

  changeMonth(delta) {
    this.state.currentMonth += delta;
    if (this.state.currentMonth > 12) {
      this.state.currentMonth = 1;
      this.state.currentYear += 1;
    } else if (this.state.currentMonth < 1) {
      this.state.currentMonth = 12;
      this.state.currentYear -= 1;
    }
    this.render();
  }

  switchTab(tab) {
    this.ui.currentTab = tab;
    document.querySelectorAll('.tab').forEach((el, i) => {
      el.classList.toggle('active', ['list', 'chart', 'budget'][i] === tab);
    });
    document.querySelectorAll('.view').forEach(el => el.style.display = 'none');
    document.getElementById(`${tab}-view`).style.display = 'block';
    if (tab === 'chart') this.renderChart();
    else if (tab === 'budget') this.renderBudget();
    else if (tab === 'master') this.renderMaster();
    else this.renderList();
  }

  setChartMode(mode) {
    this.ui.chartMode = mode;
    document.querySelectorAll('.chart-mode-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.includes(mode === 'month' ? '月別' : '年間'));
    });
    document.getElementById('chart-month').style.display = mode === 'month' ? 'block' : 'none';
    document.getElementById('chart-year').style.display = mode === 'year' ? 'block' : 'none';
    if (mode === 'month') this.renderMonthChart();
    else this.renderYearChart();
  }

  formatYen(amount) {
    return '¥' + amount.toLocaleString('ja-JP');
  }

  getMonthTxns() {
    return this.state.txns.filter(t => {
      const d = new Date(t.date);
      return d.getFullYear() === this.state.currentYear &&
             d.getMonth() + 1 === this.state.currentMonth;
    });
  }

  renderList() {
    const txns = this.getMonthTxns();
    const grouped = {};

    txns.forEach(t => {
      if (!grouped[t.date]) grouped[t.date] = [];
      grouped[t.date].push(t);
    });

    const dates = Object.keys(grouped).sort().reverse();
    let html = '';

    if (dates.length === 0) {
      html = '<div class="empty-state"><div class="icon">📊</div>取引がありません</div>';
    } else {
      dates.forEach(date => {
        const dateTxns = grouped[date];
        const dayIncome = dateTxns.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
        const dayExpense = dateTxns.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
        const dayBalance = dayIncome - dayExpense;

        html += `<div class="date-group">
          <div class="date-group-header" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
            ${new Date(date).toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', weekday: 'short' })}
            <span style="margin-left:auto;font-size:11px">${dayIncome > 0 ? '+' + this.formatYen(dayIncome) : ''} ${dayExpense > 0 ? '-' + this.formatYen(dayExpense) : ''}</span>
          </div>
          <div>
            <div class="date-summary">残高: ${this.formatYen(dayBalance)}</div>`;

        dateTxns.forEach(t => {
          const cat = [...this.getCategories('income'), ...this.getCategories('expense')].find(c => c.id === t.cat) || { icon: '📦', name: '?' };
          html += `<div class="txn-item" onclick="app.openEdit('${t.id}')">
            <div class="txn-icon">${cat.icon}</div>
            <div class="txn-info">
              <div class="txn-memo">${t.memo || 'メモなし'}</div>
              <div class="txn-cat">${cat.name}</div>
            </div>
            <div class="txn-amount ${t.type === 'income' ? 'income' : 'expense'}">
              ${t.type === 'income' ? '+' : '-'}${this.formatYen(t.amount)}
            </div>
          </div>`;
        });

        html += `</div></div>`;
      });
    }

    document.getElementById('list-view').innerHTML = html;
    this.updateSummary();
  }

  renderChart() {
    if (this.ui.chartMode === 'month') this.renderMonthChart();
    else this.renderYearChart();
  }

  renderMonthChart() {
    const txns = this.getMonthTxns();
    const expenses = txns.filter(t => t.type === 'expense');
    const incomes = txns.filter(t => t.type === 'income');

    const catTotals = {};
    expenses.forEach(t => { catTotals[t.cat] = (catTotals[t.cat] || 0) + t.amount; });
    const sorted = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);
    const total = sorted.reduce((s, [, v]) => s + v, 0);

    let html = '';

    if (sorted.length) {
      html += `<div class="chart-section"><div class="section-title">支出の内訳</div>`;
      sorted.forEach(([catId, amt], i) => {
        const cat = this.getCategories('expense').find(c => c.id === catId) || { icon: '📦', name: 'その他' };
        const pct = total ? (amt / total * 100) : 0;
        html += `<div class="category-bar">
          <div class="cat-name">${cat.icon} ${cat.name}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${CAT_COLORS[i % CAT_COLORS.length]}"></div></div>
          <div class="cat-amount">${this.formatYen(amt)}</div>
        </div>`;
      });
      html += `</div>`;
    }

    const incCatTotals = {};
    incomes.forEach(t => { incCatTotals[t.cat] = (incCatTotals[t.cat] || 0) + t.amount; });
    const incSorted = Object.entries(incCatTotals).sort((a, b) => b[1] - a[1]);
    const incTotal = incSorted.reduce((s, [, v]) => s + v, 0);

    if (incSorted.length) {
      html += `<div class="chart-section"><div class="section-title">収入の内訳</div>`;
      incSorted.forEach(([catId, amt], i) => {
        const cat = this.getCategories('income').find(c => c.id === catId) || { icon: '💰', name: 'その他' };
        const pct = incTotal ? (amt / incTotal * 100) : 0;
        html += `<div class="category-bar">
          <div class="cat-name">${cat.icon} ${cat.name}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:var(--income)"></div></div>
          <div class="cat-amount" style="color:var(--income)">${this.formatYen(amt)}</div>
        </div>`;
      });
      html += `</div>`;
    }

    document.getElementById('chart-month').innerHTML = html;
  }

  renderYearChart() {
    const monthData = {};
    for (let m = 1; m <= 12; m++) {
      monthData[m] = { income: 0, expense: 0, categories: {} };
    }

    this.state.txns.filter(t => t.type === 'income' || t.type === 'expense').forEach(t => {
      const d = new Date(t.date);
      if (d.getFullYear() === this.state.currentYear) {
        const m = d.getMonth() + 1;
        if (monthData[m]) {
          monthData[m][t.type] += t.amount;
          if (!monthData[m].categories[t.cat]) monthData[m].categories[t.cat] = 0;
          monthData[m].categories[t.cat] += t.amount;
        }
      }
    });

    let html = '<div class="chart-section"><div class="section-title">カテゴリ別月表</div>';

    const allCats = new Set();
    Object.values(monthData).forEach(m => {
      Object.keys(m.categories).forEach(cat => allCats.add(cat));
    });

    const catList = Array.from(allCats);
    html += '<table style="width:100%;font-size:11px;border-collapse:collapse">';
    html += '<tr><th style="padding:6px;text-align:left;border-bottom:1px solid var(--border)">カテゴリ</th>';
    for (let m = 1; m <= 12; m++) {
      html += `<th style="padding:6px;text-align:right;border-bottom:1px solid var(--border)">${m}月</th>`;
    }
    html += '</tr>';

    catList.forEach(catId => {
      const cat = [...this.getCategories('income'), ...this.getCategories('expense')].find(c => c.id === catId) || { icon: '📦', name: '?' };
      html += `<tr><td style="padding:6px;border-bottom:1px solid var(--border)">${cat.icon} ${cat.name}</td>`;
      for (let m = 1; m <= 12; m++) {
        const amt = monthData[m].categories[catId] || 0;
        html += `<td style="padding:6px;text-align:right;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px">${amt ? this.formatYen(amt) : '-'}</td>`;
      }
      html += '</tr>';
    });

    html += '<tr style="font-weight:600;border-top:2px solid var(--border)"><td style="padding:6px">合計</td>';
    for (let m = 1; m <= 12; m++) {
      const total = (monthData[m].income || 0) - (monthData[m].expense || 0);
      html += `<td style="padding:6px;text-align:right;color:${total >= 0 ? 'var(--income)' : 'var(--expense)'};font-family:'DM Mono',monospace">${this.formatYen(total)}</td>`;
    }
    html += '</tr></table></div>';

    document.getElementById('chart-year').innerHTML = html;
  }

  renderBudget() {
    let html = '';
    const budgets = Object.entries(this.state.budgets || {});

    if (budgets.length === 0) {
      html = '<div class="empty-state"><div class="icon">📋</div>予算が設定されていません</div>';
    } else {
      budgets.forEach(([catId, budget]) => {
        const cat = this.getCategories('expense').find(c => c.id === catId) || { icon: '📦', name: 'その他' };
        const txns = this.state.txns.filter(t => t.cat === catId && t.type === 'expense');
        const spent = txns.reduce((s, t) => s + t.amount, 0);
        const pct = Math.min(spent / budget * 100, 100);
        const color = pct > 90 ? 'var(--expense)' : pct > 70 ? 'var(--accent-orange)' : 'var(--income)';

        html += `<div class="budget-item">
          <div class="budget-info">
            <div class="budget-cat">${cat.icon} ${cat.name}</div>
            <div class="budget-bar-wrap"><div class="budget-bar-fill" style="width:${pct}%;background:${color}"></div></div>
            <div class="budget-amount">${this.formatYen(spent)} / ${this.formatYen(budget)}</div>
          </div>
          <button class="budget-edit-btn" onclick="app.openBudgetEdit('${catId}', '${cat.name}', ${budget})">設定</button>
        </div>`;
      });
    }

    document.getElementById('budget-view').innerHTML = html;
  }

  updateSummary() {
    const txns = this.getMonthTxns();
    const income = txns.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense = txns.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const balance = income - expense;

    document.getElementById('incomeAmount').textContent = this.formatYen(income);
    document.getElementById('expenseAmount').textContent = this.formatYen(expense);
    document.getElementById('balanceAmount').textContent = this.formatYen(balance);
    document.getElementById('monthLabel').textContent = `${this.state.currentYear}年${this.state.currentMonth}月`;
  }

  renderMaster() {
    let html = '';

    // 登録者名
    html += `<div class="master-section">
      <div class="master-section-title">登録者名</div>
      <div class="add-cat-form">
        <input type="text" id="masterUserName" class="form-input" style="flex:1" value="${this.state.userName}">
        <button class="add-btn" onclick="app.saveMasterUserName()">保存</button>
      </div>
    </div>`;

    // 支出カテゴリ
    html += `<div class="master-section">
      <div class="master-section-title">支出カテゴリ</div>
      <div class="cat-list">`;

    this.getCategories('expense').forEach(cat => {
      const isCustom = this.state.customCategories.expense.some(c => c.id === cat.id);
      html += `<div class="cat-chip">
        <div class="cat-chip-icon">${cat.icon}</div>
        <div style="font-size:10px">${cat.name}</div>
        ${isCustom ? `<button class="cat-chip-delete" onclick="app.deleteCat('expense', '${cat.id}')">×</button>` : ''}
      </div>`;
    });

    html += `</div>
      <div class="add-cat-form">
        <div class="add-cat-input">
          <input type="text" id="expenseCatInput" placeholder="カテゴリ名" maxlength="8">
          <input type="text" id="expenseCatEmoji" placeholder="絵文字" maxlength="2" class="add-cat-emoji">
        </div>
        <button class="add-btn" onclick="app.addCat('expense')">追加</button>
      </div>
    </div>`;

    // 収入カテゴリ
    html += `<div class="master-section">
      <div class="master-section-title">収入カテゴリ</div>
      <div class="cat-list">`;

    this.getCategories('income').forEach(cat => {
      const isCustom = this.state.customCategories.income.some(c => c.id === cat.id);
      html += `<div class="cat-chip">
        <div class="cat-chip-icon">${cat.icon}</div>
        <div style="font-size:10px">${cat.name}</div>
        ${isCustom ? `<button class="cat-chip-delete" onclick="app.deleteCat('income', '${cat.id}')">×</button>` : ''}
      </div>`;
    });

    html += `</div>
      <div class="add-cat-form">
        <div class="add-cat-input">
          <input type="text" id="incomeCatInput" placeholder="カテゴリ名" maxlength="8">
          <input type="text" id="incomeCatEmoji" placeholder="絵文字" maxlength="2" class="add-cat-emoji">
        </div>
        <button class="add-btn" onclick="app.addCat('income')">追加</button>
      </div>
    </div>`;

    document.getElementById('master-view').innerHTML = html;
  }

  addCat(type) {
    const nameInput = document.getElementById(`${type}CatInput`);
    const emojiInput = document.getElementById(`${type}CatEmoji`);
    const name = nameInput.value.trim();
    const emoji = emojiInput.value.trim();

    if (!name || !emoji) {
      this.showToast('カテゴリ名と絵文字を入力してください');
      return;
    }

    const id = 'custom_' + Date.now();
    const newCat = { id, icon: emoji, name };
    this.state.customCategories[type].push(newCat);
    this.saveCustomCategories();
    nameInput.value = '';
    emojiInput.value = '';
    this.renderMaster();
    this.showToast('カテゴリを追加しました');
  }

  deleteCat(type, id) {
    this.state.customCategories[type] = this.state.customCategories[type].filter(c => c.id !== id);
    this.saveCustomCategories();
    this.renderMaster();
    this.showToast('カテゴリを削除しました');
  }

  saveMasterUserName() {
    const name = document.getElementById('masterUserName').value.trim();
    if (name) {
      this.state.userName = name;
      localStorage.setItem('kakeiboUserName', name);
      this.showToast('保存しました');
    }
  }

  render() {
    this.updateSummary();
    if (this.ui.currentTab === 'list') this.renderList();
    else if (this.ui.currentTab === 'chart') this.renderChart();
    else if (this.ui.currentTab === 'budget') this.renderBudget();
    else if (this.ui.currentTab === 'master') this.renderMaster();
  }

  // MODALS
  openModal() {
    this.ui.editingId = null;
    document.getElementById('modalTitle').textContent = '取引を追加';
    document.getElementById('deleteBtn').style.display = 'none';
    document.getElementById('txnDate').valueAsDate = new Date();
    document.getElementById('txnAmount').value = '';
    document.getElementById('txnMemo').value = '';
    this.setType('expense');
    this.renderCatButtons();
    document.getElementById('modalOverlay').classList.add('open');
  }

  openEdit(id) {
    const txn = this.state.txns.find(t => t.id === id);
    if (!txn) return;

    this.ui.editingId = id;
    document.getElementById('modalTitle').textContent = '取引を編集';
    document.getElementById('deleteBtn').style.display = 'block';
    document.getElementById('txnDate').valueAsDate = new Date(txn.date);
    document.getElementById('txnAmount').value = txn.amount;
    document.getElementById('txnMemo').value = txn.memo;
    this.setType(txn.type);
    this.ui.selectedCat = txn.cat;
    this.renderCatButtons();
    document.getElementById('modalOverlay').classList.add('open');
  }

  closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  saveTxn() {
    const date = document.getElementById('txnDate').value;
    const amount = parseInt(document.getElementById('txnAmount').value) || 0;
    const memo = document.getElementById('txnMemo').value;

    if (!date || amount <= 0) {
      this.showToast('日付と金額を入力してください');
      return;
    }

    if (this.ui.editingId) {
      const txn = this.state.txns.find(t => t.id === this.ui.editingId);
      if (txn) {
        txn.date = date;
        txn.amount = amount;
        txn.memo = memo;
        txn.type = this.ui.selectedType;
        txn.cat = this.ui.selectedCat;
      }
    } else {
      this.state.txns.push({
        id: Date.now().toString(),
        date,
        type: this.ui.selectedType,
        cat: this.ui.selectedCat,
        amount,
        memo
      });
    }

    this.saveTxns();
    this.render();
    this.closeModal();
    this.showToast('保存しました');
  }

  deleteTxn() {
    if (this.ui.editingId) {
      this.state.txns = this.state.txns.filter(t => t.id !== this.ui.editingId);
      this.saveTxns();
      this.render();
      this.closeModal();
      this.showToast('削除しました');
    }
  }

  setType(type) {
    this.ui.selectedType = type;
    document.querySelectorAll('.type-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.includes(type === 'expense' ? '支出' : '収入'));
    });
    this.renderCatButtons();
  }

  renderCatButtons() {
    const cats = this.getCategories(this.ui.selectedType);
    let html = '';
    cats.forEach(cat => {
      html += `<button class="cat-btn ${cat.id === this.ui.selectedCat ? 'selected' : ''}" onclick="app.ui.selectedCat='${cat.id}';app.renderCatButtons()">
        ${cat.icon}<br><span style="font-size:9px">${cat.name}</span>
      </button>`;
    });
    document.getElementById('catButtons').innerHTML = html;
  }

  openExportImport() {
    document.getElementById('exportImportOverlay').classList.add('open');
  }

  closeExportImport() {
    document.getElementById('exportImportOverlay').classList.remove('open');
  }

  exportData() {
    const data = {
      version: 1,
      exportDate: new Date().toISOString(),
      txns: this.state.txns,
      budgets: this.state.budgets
    };

    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `kakeibo-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
    this.showToast('ダウンロードしました');
  }

  importData() {
    document.getElementById('importFileInput').click();
  }

  handleImportFile(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.txns && Array.isArray(data.txns)) {
          this.ui.pendingImport = data;
          document.getElementById('importItemCount').textContent = data.txns.length;
          document.getElementById('importConfirmOverlay').classList.add('open');
        }
      } catch (err) {
        this.showToast('ファイルが無効です');
      }
    };
    reader.readAsText(file);
  }

  confirmImport() {
    if (this.ui.pendingImport && this.ui.pendingImport.txns) {
      this.state.txns.push(...this.ui.pendingImport.txns);
      if (this.ui.pendingImport.budgets) {
        this.state.budgets = { ...this.state.budgets, ...this.ui.pendingImport.budgets };
      }
      this.saveTxns();
      this.saveBudgets();
      this.ui.pendingImport = null;
      document.getElementById('importConfirmOverlay').classList.remove('open');
      this.render();
      this.showToast('インポートしました');
    }
  }

  cancelImport() {
    this.ui.pendingImport = null;
    document.getElementById('importConfirmOverlay').classList.remove('open');
  }

  openBudgetEdit(catId, catName, budget) {
    this.ui.budgetEditCat = catId;
    document.getElementById('budgetCatLabel').textContent = catName;
    document.getElementById('budgetAmount').value = budget;
    document.getElementById('budgetModalOverlay').classList.add('open');
  }

  closeBudgetModal() {
    document.getElementById('budgetModalOverlay').classList.remove('open');
  }

  saveBudget() {
    const amount = parseInt(document.getElementById('budgetAmount').value) || 0;
    if (amount > 0) {
      this.state.budgets[this.ui.budgetEditCat] = amount;
      this.saveBudgets();
      this.renderBudget();
      this.closeBudgetModal();
      this.showToast('保存しました');
    }
  }

  openScan() {
    this.showToast('レシートスキャン機能は準備中です');
  }

  closeOverlay(event, overlayId) {
    if (event.target.id === overlayId) {
      document.getElementById(overlayId).classList.remove('open');
    }
  }

  showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  setupEventListeners() {
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay.open').forEach(el => {
          el.classList.remove('open');
        });
      }
    });
  }

  checkForUpdates() {
    fetch(window.location.href + '?t=' + Date.now())
      .then(r => r.text())
      .then(html => {
        const match = html.match(/const APP_VERSION = '([^']+)'/);
        const latestVersion = match ? match[1] : null;
        if (latestVersion && latestVersion !== APP_VERSION) {
          document.getElementById('updateModal').classList.add('show');
        }
      })
      .catch(() => {});
  }

  updateApp() {
    location.reload(true);
  }

  closeUpdateModal() {
    document.getElementById('updateModal').classList.remove('show');
  }
}

const app = new KakeiboApp();
</script>

</body>
</html>
